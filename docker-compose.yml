# TradeSpace — Development Docker Compose
# For production deployment use: docker compose -f docker-compose.prod.yml up -d --build
#
# Quick start:
#   1. cp .env.example .env              (fill in passwords)
#   2. cp backend/.env.example backend/.env   (fill in API keys)
#   3. cp frontend/.env.example frontend/.env (fill in Firebase keys)
#   4. docker compose up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: tradespace-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_dev_password}
      POSTGRES_DB: ${DB_NAME:-tradespace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tradespace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: tradespace-backend
    restart: always
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - tradespace-net

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_API_URL is a BUILD-TIME variable — baked into the JS bundle by Vite.
        # Changing this value requires rebuilding the image (docker compose up --build).
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    container_name: tradespace-frontend
    restart: always
    ports:
      - "8080:80"
    networks:
      - tradespace-net

  nginx:
    image: nginx:alpine
    container_name: tradespace-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tradespace-net

networks:
  tradespace-net:
    driver: bridge

volumes:
  postgres_data:
