# TradeSpace — Production Docker Compose
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Before first run:
#   1. cp backend/.env.example backend/.env   (fill in REAL secrets)
#   2. Obtain SSL cert: sudo certbot certonly --standalone -d yourdomain.com
#   3. Update deploy/nginx/tradespace.conf with your real domain name

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tradespace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: always
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tradespace-net

  frontend:
    build:
      context: ./frontend
      args:
        # Pass your production domain so Vite bakes the correct API URL into the bundle.
        # Example: VITE_API_URL=https://yourdomain.com/api
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    restart: always
    networks:
      - tradespace-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tradespace-net

networks:
  tradespace-net:
    driver: bridge

volumes:
  postgres_data:
