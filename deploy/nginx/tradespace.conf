# TradeSpace Nginx Configuration
# This configuration serves as a reverse proxy for the backend and a static server for the frontend.

server {
    listen 80;
    server_name example.com; # Replace with your actual domain

    # Redirect all HTTP traffic to HTTPS (Uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # Frontend static files
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for AI analysis tasks
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # SSL Configuration Notes:
    # 1. Use Certbot to generate certificates:
    #    sudo certbot certonly --standalone -d example.com
    # 2. Add the following block to enable HTTPS:
    # server {
    #     listen 443 ssl;
    #     server_name example.com;
    #     ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    #     include /etc/nginx/conf.d/tradespace.conf; # Or merge the locations here
    # }
}
